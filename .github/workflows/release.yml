name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          # GoReleaser uses this token for both: creating the GitHub release
          # in this repo AND pushing the Homebrew formula update to
          # wirelogai/homebrew-tap. The default GITHUB_TOKEN can do the first
          # but not the second (it's scoped to this repo only). Use a PAT
          # stored in HOMEBREW_TAP_TOKEN with `contents:write` on
          # wirelogai/homebrew-tap and `contents:write` on this repo.
          # Falls back to GITHUB_TOKEN if HOMEBREW_TAP_TOKEN isn't set, so
          # the GitHub release still publishes successfully (only the
          # Homebrew step fails) — matches the pre-fix behaviour.
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN || secrets.GITHUB_TOKEN }}
